<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runal — web (wasm)</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        background: #0b0b0f;
        color: #d7d7e0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 16px;
        border-bottom: 1px solid #22222c;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 { font-size: 14px; margin: 0; color: #ff5fd2; letter-spacing: 2px; }
      header .status { margin-left: auto; color: #6b6b7b; }
      main { display: flex; flex: 1; min-height: 0; }
      .pane { display: flex; flex-direction: column; min-width: 0; }
      .editor { width: 42%; border-right: 1px solid #22222c; }
      .editor textarea {
        flex: 1;
        resize: none;
        border: 0;
        outline: 0;
        padding: 12px;
        background: #0e0e14;
        color: #cdd0e0;
        font: inherit;
        tab-size: 2;
      }
      .toolbar { padding: 8px 12px; border-top: 1px solid #22222c; display: flex; gap: 8px; }
      button {
        font: inherit;
        cursor: pointer;
        background: #ff5fd2;
        color: #0b0b0f;
        border: 0;
        padding: 6px 14px;
        border-radius: 4px;
        font-weight: 600;
      }
      button.secondary { background: #22222c; color: #cdd0e0; }
      .stage { flex: 1; position: relative; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      .err {
        position: absolute; left: 0; right: 0; bottom: 0;
        background: #3a0d16; color: #ff9db1; padding: 8px 12px;
        white-space: pre-wrap; display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RUNAL</h1>
      <span>creative coding in the browser (wasm)</span>
      <span class="status" id="status">loading…</span>
    </header>
    <main>
      <div class="pane editor">
        <textarea id="src" spellcheck="false"></textarea>
        <div class="toolbar">
          <button id="run">Run ▶</button>
          <button id="stop" class="secondary">Stop ■</button>
          <button id="png" class="secondary">PNG</button>
          <button id="gif" class="secondary">GIF</button>
          <button id="webm" class="secondary">Video</button>
        </div>
      </div>
      <div class="pane" style="flex:1;">
        <div class="stage">
          <canvas id="canvas"></canvas>
          <div class="err" id="err"></div>
        </div>
      </div>
    </main>

    <script src="wasm_exec.js"></script>
    <script src="gif.js"></script>
    <script src="runal.js"></script>
    <script>
      const DEFAULT_SKETCH = `function setup(c) {
  c.background("#000000");
}

function draw(c) {
  const ramp = " .:-=+*#%@";
  for (let x = 0; x < c.width; x++) {
    for (let y = 0; y < c.height; y++) {
      const n = c.noise2D(x * 0.05 + c.framecount / 40, y * 0.05);
      const ch = ramp[Math.floor(c.map(n, 0, 1, 0, ramp.length - 1))];
      const hue = Math.floor(c.map(n, 0, 1, 200, 330));
      c.stroke(ch, c.colorHSV(hue, 85, 100), "#000000");
      c.point(x, y);
    }
  }
}

function onMouseMove(c, e) {
  c.noiseSeed(e.x * 7 + e.y);
}
`;

      const $ = (id) => document.getElementById(id);
      const status = $("status");
      const errBox = $("err");
      const canvas = $("canvas");
      $("src").value = DEFAULT_SKETCH;

      const FONT_SIZE = 16;
      let ready = false;
      let running = null;

      function showError(msg) {
        errBox.textContent = msg;
        errBox.style.display = "block";
      }

      function run() {
        if (!ready) return;
        errBox.style.display = "none";
        const msg = Runal.start($("src").value, canvas, { fontSize: FONT_SIZE, onError: showError });
        if (msg) showError(msg);
      }

      $("run").onclick = run;
      $("stop").onclick = () => Runal.stop();
      $("png").onclick = () => Runal.savePNG("runal.png");
      $("gif").onclick = () => Runal.recordGIF("runal.gif", 3, 20);
      $("webm").onclick = () => Runal.recordVideo("runal.mp4", 3);

      Runal.boot("runal.wasm")
        .then(() => {
          ready = true;
          status.textContent = "ready";
          if (!new URLSearchParams(location.search).has("norun")) run();
        })
        .catch((e) => {
          status.textContent = "failed to load";
          showError(String(e));
        });
    </script>
  </body>
</html>

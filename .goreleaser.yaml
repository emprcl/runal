version: 2

project_name: runal

before:
  hooks:
    - go mod download

builds:
  - id: runal
    # The CLI lives in its own module that uses `replace` directives back to
    # the repo root, so we build from there with the workspace disabled
    # (GOWORK=off) to get a deterministic, reproducible build.
    dir: cmd/runal
    main: ./
    binary: runal
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6" # Raspberry Pi 1 / Zero
      - "7" # Raspberry Pi 2 / 32-bit Pi OS
    ignore:
      # No 32-bit ARM on macOS
      - goos: darwin
        goarch: arm
      # No ARM Windows builds
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64

archives:
  - id: runal
    # Produces e.g. runal_0.10.0_linux_arm64.tar.gz, runal_0.10.0_linux_armv7.tar.gz
    # The os/arch suffix is what the install script matches against.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: emprcl
    name: runal
